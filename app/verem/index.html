<!DOCTYPE html>
<html>

<head>
    <title>Drawing Example</title>
</head>

<body>
    <canvas id="drawingCanvas" width="500" height="500" style="border:1px solid #000000;"></canvas>
    <div id="mousePosition"></div>
    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();

        function drawMe(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, 2 * Math.PI);
            ctx.moveTo(x, y + 10);
            ctx.lineTo(x, y + 30);
            ctx.moveTo(x, y + 15);
            ctx.lineTo(x - 10, y + 25);
            ctx.moveTo(x, y + 15);
            ctx.lineTo(x + 10, y + 25);
            ctx.moveTo(x, y + 30);
            ctx.lineTo(x - 10, y + 40);
            ctx.moveTo(x, y + 30);
            ctx.lineTo(x + 10, y + 40);
            ctx.stroke();
        }


        ctx.font = "16px Arial";
        ctx.fillText("ME", 80, 70);

        const drawParabola = (p1, p2, p3) => {
            const matrix = [
                [p1.x ** 2, p1.x, 1, p1.y],
                [p2.x ** 2, p2.x, 1, p2.y],
                [p3.x ** 2, p3.x, 1, p3.y]
            ];
            function solve(matrix) {
                for (let i = 0; i < 3; i++) {
                    for (let j = i + 1; j < 3; j++) {
                        const factor = matrix[j][i] / matrix[i][i];
                        for (let k = i; k < 4; k++) {
                            matrix[j][k] -= factor * matrix[i][k];
                        }
                    }
                }

                const c = matrix[2][3] / matrix[2][2];
                const b = (matrix[1][3] - matrix[1][2] * c) / matrix[1][1];
                const a = (matrix[0][3] - matrix[0][2] * c - matrix[0][1] * b) / matrix[0][0];

                return { a, b, c };
            }

            const { a, b, c } = solve(matrix);
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x++) {
                const y = a * x ** 2 + b * x + c;
                if (y > 100) {
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
            }
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
            const segmentCount = 15;
            const step = (p3.x - p2.x) / (segmentCount - 1);
            const y_step = (p3.y - p2.y) / (segmentCount - 1);

            for (let i = 0; i < segmentCount; i++) {
                if (i === 0 || i === segmentCount - 1) {
                    continue;
                }
                const x = p2.x + i * step;
                const y = p2.y + i * y_step;

                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = "red";
                ctx.fill();
                ctx.closePath();
                ctx.font = "12px Arial";
                ctx.fillStyle = "black";
                ctx.fillText(`P${i + 1}`, x + 30, y - 10);
            }
        }

        function drawArrow(x, y) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 20, y - 20);
            ctx.moveTo(x, y);
            ctx.lineTo(x - 20, y - 20);
            ctx.stroke();
        }

        function drawCar(x, y) {
            ctx.beginPath();
            ctx.rect(x, y, 50, 20);
            ctx.arc(x + 10, y + 20, 5, 0, 2 * Math.PI);
            ctx.arc(x + 40, y + 20, 5, 0, 2 * Math.PI);
            ctx.stroke();
        }

        drawEndPoint = (x, y) => {
            ctx.beginPath();
            ctx.arc(x + 10, y + 10, 15, 0, 2 * Math.PI);
            ctx.moveTo(x, y);
            ctx.lineTo(x + 20, y + 20);
            ctx.moveTo(x + 20, y);
            ctx.lineTo(x, y + 20);
            ctx.stroke();
        }


        ctx.font = "16px Arial";
        ctx.fillText("TERVEK", 400, 50);
        ctx.moveTo(400, 60);
        ctx.lineTo(460, 60);
        ctx.moveTo(400, 70);
        ctx.lineTo(460, 70);
        ctx.moveTo(400, 80);
        ctx.lineTo(460, 80);
        ctx.stroke();



        function drawPit() {
            ctx.beginPath();
            ctx.moveTo(0, rect.height * 0.2);
            ctx.lineTo(rect.width * 0.2, rect.height * 0.2);
            ctx.moveTo(rect.width * 0.8, rect.height * 0.2);
            ctx.lineTo(rect.width, rect.height * 0.2);
            ctx.stroke();
        }

        drawPit();
        drawEndPoint(240, 290);
        drawParabola(
            { x: rect.width * 0.2, y: rect.height * 0.2 },
            { x: rect.width * 0.5, y: rect.height * 0.9 },
            { x: rect.width * 0.8, y: rect.height * 0.2 }
        );

        displayMousePosition = (x, y) => {
            document.getElementById("mousePosition").innerHTML = `Mouse Position: (${x}, ${y})`;
        }
        canvas.addEventListener("mousemove", (event) => {
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            displayMousePosition(mouseX, mouseY);
        });
    </script>
</body>

</html>
